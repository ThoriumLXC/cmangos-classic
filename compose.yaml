services:
  database:
    image: docker.io/thoriumlxc/cmangos-classicdb:2025.02.18
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 1m
      timeout: 3s
      retries: 5
      start_period: 5m
    volumes:
      - cmangos-classic-database:/var/lib/mysql
    environment:
      - TZ=Etc/UTC
      - MARIADB_USER=mangos
      - MARIADB_PASSWORD=mangos
      - MARIADB_ROOT_PASSWORD=password
      # Emulator Specific
      - REALMLIST_NAME=CMaNGOS
      - REALMLIST_ADDRESS=127.0.0.1
      - REALMLIST_PORT=8085
      - REALMLIST_ICON=1
      - REALMLIST_TIMEZONE=0
      - REALMLIST_ALLOWED_SECURITY_LEVEL=0

  wait-for-db:
    image: atkrad/wait4x
    depends_on:
      - database
    command: tcp database:3306 -t 600s -i 5s

  realmd:
    image: docker.io/thoriumlxc/cmangos-classic:default-2025.02.18
    command: realmd
    ulimits:
      nofile: 1024
    depends_on:
      wait-for-db:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'nc', '-z', 'localhost', '3724']
      interval: 1m
      timeout: 3s
      retries: 5
      start_period: 5m
    restart: unless-stopped
    volumes:
      - ./realmd.conf:/opt/mangos/config/realmd.conf:ro
      - ./logs/realmd:/opt/mangos/storage/logs
    ports:
      - 3724:3724
    environment:
      - TZ=Etc/UTC

  mangosd:
    image: docker.io/thoriumlxc/cmangos-classic:default-2025.02.18
    command: mangosd
    ulimits:
      nofile: 1024
    tty: true
    stdin_open: true
    depends_on:
      wait-for-db:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_grace_period: 2m
    healthcheck:
      test: ['CMD', 'nc', '-z', 'localhost', '8085']
      interval: 1m
      timeout: 3s
      retries: 5
      start_period: 5m
    ports:
      - 8085:8085
    environment:
      - TZ=Etc/UTC
    volumes:
      - cmangos-classic-map-data:/opt/mangos/storage/data:ro
      - ./mangosd.conf:/opt/vmangos/config/mangosd.conf:ro
      - ./logs/mangosd:/opt/vmangos/storage/logs
      - ./storage/honor:/opt/vmangos/storage/honor

  phpmyadmin:
    image: phpmyadmin
    depends_on:
      - database
    restart: unless-stopped
    ports:
      - 9090:80
    environment:
      - PMA_HOST=database
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=password

volumes:
  vmangos-database:
  cmangos-classic-map-data:
    external: true
